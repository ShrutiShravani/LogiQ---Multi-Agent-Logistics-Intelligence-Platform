nyc_tlc:
  description: "NYC Taxi & Limousine Commission Trip Record Data"
  columns:
    - id
    - vendor_id
    - pickup_datetime
    - dropoff_datetime
    - passenger_count
    - pickup_longitude
    - pickup_latitude
    - dropoff_longitude
    - dropoff_latitude
    - store_and_fwd_flag
    - trip_duration

  data_types:
    # Integer columns
    id: integer
    vendor_id: integer
    passenger_count: integer
    trip_duration: integer
    
    # Datetime columns (currently object/string)
    pickup_datetime: datetime
    dropoff_datetime: datetime
    
    # Float columns
    pickup_longitude: float
    pickup_latitude: float
    dropoff_longitude: float
    dropoff_latitude: float
    
    # String/Categorical columns
    store_and_fwd_flag: string

  critical_columns:
    - id
    - pickup_datetime
    - dropoff_datetime
    - pickup_longitude
    - pickup_latitude
    - dropoff_longitude
    - dropoff_latitude
    - trip_duration

  important_columns:
    - vendor_id
    - passenger_count
    - store_and_fwd_flag

